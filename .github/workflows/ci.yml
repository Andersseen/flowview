name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run Rust tests
        run: cargo test --workspace

  typescript:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install WASM toolchain
        run: |
          rustup target add wasm32-unknown-unknown
          cargo install wasm-pack --locked

      - name: Install dependencies
        run: pnpm install

      - name: Build runtime
        run: pnpm run build:runtime

      - name: Run TypeScript tests
        run: pnpm run test:runtime

      - name: Build and test Vite integration
        run: pnpm run test:vite

      - name: Test Astro integration
        run: pnpm run test:astro

      - name: Test Prettier plugin
        run: pnpm run test:prettier

      - name: Build DOM events package
        run: pnpm run build:dom

      - name: Check TypeScript types
        run: pnpm run typecheck

  astro-demo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install WASM toolchain
        run: |
          rustup target add wasm32-unknown-unknown
          cargo install wasm-pack --locked

      - name: Install dependencies
        run: pnpm install

      - name: Build Astro demo
        run: pnpm run build:demo

      - name: Run Astro demo unit tests
        run: pnpm run test:demo

      - name: Test VS Code grammar
        run: pnpm run test:vscode

      - name: Install Chromium
        run: pnpm --filter @flowview/astro-demo exec playwright install --with-deps chromium

      - name: Run Astro end-to-end tests
        run: pnpm run test:e2e:demo
